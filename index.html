<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Webフォトフレーム</title>

<style>

body{
margin:0;
padding:20px;
text-align:center;
background:#f5f5f5;
font-family:sans-serif;
}

/* カメラエリア */
.camera-container{
position:relative;

width:90vw;
height:90vw;

max-width:400px;
max-height:400px;

margin:auto;

overflow:hidden;

border-radius:20px;

background:black;
}

/* カメラ映像 */
video{
width:100%;
height:100%;
object-fit:cover;
}

/* フレーム */
#frame{
position:absolute;
top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;
}

/* ボタン */
button{
margin-top:20px;
padding:12px 24px;
font-size:18px;
border:none;
border-radius:10px;
background:#333;
color:white;
}

</style>
</head>

<body>

<h1>Webフォトフレーム</h1>

<div class="camera-container">

<!-- カメラ映像 -->
<video
id="video"
autoplay
playsinline>
</video>

<!-- フレーム -->
<img
id="frame"
src="frame.png">

</div>

<!-- 撮影 -->
<button id="capture">
撮影して保存
</button>

<!-- 非表示canvas -->
<canvas
id="canvas"
style="display:none;">
</canvas>

<script>

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const capture =
document.getElementById("capture");

const ctx =
canvas.getContext("2d");

/* カメラ起動 */
navigator.mediaDevices
.getUserMedia({
video:{
facingMode:"user"
}
})
.then((stream)=>{

video.srcObject = stream;

});

/* 撮影 */
capture.addEventListener(
"click",
()=>{

/* canvasサイズ */
canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

/* カメラ描画 */
ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

/* フレーム取得 */
const frame =
document.getElementById("frame");

/* フレーム描画 */
ctx.drawImage(
frame,
0,
0,
canvas.width,
canvas.height
);

/* 保存 */
const link =
document.createElement("a");

link.download =
"photo.png";

link.href =
canvas.toDataURL("image/png");

link.click();

}
);

</script>

</body>
</html>
