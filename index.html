<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Webフォトブース</title>

<style>

/* 全体 */
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:black;
}

/* カメラ全画面 */
.camera-area{
position:fixed;
top:0;
left:0;

width:100vw;
height:100vh;

overflow:hidden;
}

/* カメラ映像 */
video{
width:100%;
height:100%;
object-fit:cover;
}

/* フレーム */
#frame{
position:absolute;
top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;
object-fit:cover;
}

/* 下ボタンエリア */
.controls{
position:fixed;
bottom:20px;
left:0;

width:100%;

display:flex;
justify-content:space-around;
align-items:center;

z-index:10;
}

/* 丸ボタン */
.circle-btn{
width:70px;
height:70px;

border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;

border:none;
}

/* シャッターボタン */
.shutter{
width:90px;
height:90px;

border-radius:50%;

background:white;

border:6px solid #ddd;
}

/* モーダル背景 */
.modal{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.7);

display:none;

justify-content:center;
align-items:center;

z-index:100;
}

/* 白画面 */
.modal-content{
width:85%;
max-width:400px;

background:white;

border-radius:20px;

padding:20px;

text-align:center;
}

/* 保存画像 */
#result{
width:100%;
border-radius:10px;
}

/* 閉じる */
.close-btn{
margin-top:20px;

padding:12px 24px;

border:none;

border-radius:10px;

background:#f0a040;

color:white;

font-size:18px;
}

/* カウント */
.count{
position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:120px;
font-weight:bold;

color:white;

z-index:200;

display:none;
}

/* フラッシュ */
.flash{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:white;

opacity:0;

pointer-events:none;

z-index:300;
}

</style>
</head>

<body>

<!-- カメラ -->
<div class="camera-area">

<video
id="video"
autoplay
playsinline>
</video>

<img
id="frame"
src="frame.png">

</div>

<!-- ボタン -->
<div class="controls">

<button
class="circle-btn"
id="retry">
↺
</button>

<button
class="shutter"
id="capture">
</button>

<button
class="circle-btn"
id="changeCamera">
⇄
</button>

</div>

<!-- カウント -->
<div
class="count"
id="count">
3
</div>

<!-- フラッシュ -->
<div
class="flash"
id="flash">
</div>

<!-- モーダル -->
<div
class="modal"
id="modal">

<div class="modal-content">

<img id="result">

<h2>画像を長押しして保存</h2>

<button
class="close-btn"
id="closeModal">
閉じる
</button>

</div>

</div>

<!-- canvas -->
<canvas
id="canvas"
style="display:none;">
</canvas>

<script>

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const capture =
document.getElementById("capture");

const result =
document.getElementById("result");

const modal =
document.getElementById("modal");

const closeModal =
document.getElementById("closeModal");

const count =
document.getElementById("count");

const flash =
document.getElementById("flash");

const frame =
document.getElementById("frame");

const changeCamera =
document.getElementById("changeCamera");

let facingMode = "user";

let stream;

/* カメラ起動 */
async function startCamera(){

if(stream){
stream.getTracks().forEach(
track => track.stop()
);
}

stream =
await navigator.mediaDevices
.getUserMedia({
video:{
facingMode:{
exact:facingMode
}
}
});

video.srcObject = stream;

}

startCamera();

/* カメラ切替 */
changeCamera.addEventListener(
"click",
()=>{

facingMode =
facingMode === "user"
? "environment"
: "user";

startCamera();

}
);

/* 撮影 */
capture.addEventListener(
"click",
async ()=>{

/* カウント */
count.style.display = "block";

for(let i=3;i>=1;i--){

count.textContent = i;

await new Promise(
r => setTimeout(r,1000)
);

}

count.style.display = "none";

/* フラッシュ */
flash.style.opacity = "1";

setTimeout(()=>{
flash.style.opacity = "0";
},100);

/* canvasサイズ */
canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

/* カメラ描画 */
ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

/* フレーム描画 */
ctx.drawImage(
frame,
0,
0,
canvas.width,
canvas.height
);

/* 保存画像 */
const image =
canvas.toDataURL("image/png");

result.src = image;

/* モーダル表示 */
modal.style.display = "flex";

}
);

/* 閉じる */
closeModal.addEventListener(
"click",
()=>{

modal.style.display = "none";

}
);

</script>

</body>
</html>
