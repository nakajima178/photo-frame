<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Webフォトブース</title>

<!-- CSS -->
<link
rel="stylesheet"
href="style.css">

</head>

<body>

<!-- カメラ画面 -->
<div class="camera-area">

<!-- カメラ -->
<video
id="video"
autoplay
playsinline>
</video>

<!-- 動かせるキャラ -->
<img
id="character"
src="character.png">

<!-- 固定フレーム -->
<img
id="frame"
src="frame.png">

</div>

<!-- ボタン -->
<div class="controls">

<!-- 撮影 -->
<button
class="shutter-btn"
id="captureBtn">
</button>

<!-- カメラ切替 -->
<button
class="circle-btn"
id="changeCameraBtn">
⇄
</button>

</div>

<!-- 保存画面 -->
<div
class="modal"
id="modal">

<div class="modal-content">

<img id="result">

<h2>
画像を長押しして保存
</h2>

<button
class="close-btn"
id="closeBtn">

閉じる

</button>

</div>

</div>

<!-- canvas -->
<canvas
id="canvas"
style="display:none;">
</canvas>

<!-- JavaScript -->
<script src="script.js"></script>

</body>

</html>
